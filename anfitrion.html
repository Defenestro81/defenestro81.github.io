<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timbre — Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    min-height: 100%;
    background: #0f0e0c;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    color: #e8d5a3;
    padding: 2rem 1rem;
  }

  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 40% 60%, #1a1206 0%, #0f0e0c 70%);
    z-index: 0;
  }

  .panel {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    max-width: 400px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: #e8d5a3;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    color: #5a5040;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    margin-bottom: 2rem;
  }

  .indicator {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: 0 auto 1.5rem;
    background: #1a1810;
    border: 2px solid #2a2418;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    transition: all 0.3s;
  }

  .indicator.ring {
    background: #2a1f06;
    border-color: #c9a84c;
    box-shadow: 0 0 40px rgba(201,168,76,0.5), 0 0 80px rgba(201,168,76,0.2);
    animation: pulse 0.6s ease-out;
  }

  @keyframes pulse {
    0%  { transform: scale(1); }
    30% { transform: scale(1.15); }
    60% { transform: scale(0.95); }
    100%{ transform: scale(1); }
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3a3228;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.green { background: #7abf7a; box-shadow: 0 0 6px #7abf7a; }
  .dot.red   { background: #bf7a7a; }

  .conn-status {
    font-size: 0.8rem;
    color: #5a5040;
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .selector-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #3a3228;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  /* Cada botón de timbre */
  .timbre-btn {
    background: #141210;
    border: 1px solid #1e1c18;
    border-radius: 6px;
    padding: 0.65rem 0.5rem 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
    color: #7a6e5e;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  .timbre-btn .icon { font-size: 1.4rem; line-height: 1; }
  .timbre-btn .name { line-height: 1.2; }

  .timbre-btn:hover { border-color: #3a3228; color: #c9a84c; }

  .timbre-btn.active {
    border-color: #c9a84c;
    background: #1e1a0e;
    color: #c9a84c;
    box-shadow: 0 0 12px rgba(201,168,76,0.15);
  }

  /* Recreo ocupa columna completa */
  .timbre-btn.full {
    grid-column: 1 / -1;
  }

  .timbre-btn.recreo.active {
    border-color: #c9604c;
    background: #1e100e;
    color: #c9604c;
    box-shadow: 0 0 14px rgba(201,96,76,0.2);
  }
  .timbre-btn.recreo:hover { border-color: #c9604c; color: #c9604c; }

  .preview-btn {
    background: none;
    border: none;
    color: #3a3228;
    font-size: 0.65rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: color 0.2s;
    padding: 0;
    margin-top: 0.1rem;
  }
  .preview-btn:hover { color: #c9a84c; }

  .log-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #3a3228;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .log {
    background: #141210;
    border: 1px solid #1e1c18;
    border-radius: 6px;
    padding: 0.75rem 1rem;
    min-height: 80px;
    max-height: 160px;
    overflow-y: auto;
    text-align: left;
  }

  .log-entry {
    font-size: 0.82rem;
    color: #7a6e5e;
    padding: 0.35rem 0;
    border-bottom: 1px solid #1a1810;
    display: flex;
    justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .time { color: #c9a84c; font-size: 0.75rem; font-weight: 500; }
  .log-entry .lbl { color: #5a5040; font-size: 0.7rem; margin-left: 0.4rem; }

  .empty { color: #2a2418; font-size: 0.8rem; padding: 1rem 0; text-align: center; }

  .activate {
    margin-top: 1.5rem;
    margin-bottom: 2rem;
    padding: 0.7rem 2rem;
    background: transparent;
    border: 1px solid #2a2418;
    color: #5a5040;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .activate:hover { border-color: #c9a84c; color: #c9a84c; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="panel">
  <h1>Timbre</h1>
  <p class="subtitle">Panel del anfitrión</p>

  <div class="indicator" id="indicator">🔔</div>

  <div class="conn-status">
    <span class="dot" id="dot"></span>
    <span id="connText">Conectando…</span>
  </div>

  <div class="selector-title">Elegí el timbre</div>
  <div class="selector">
    <button class="timbre-btn active" onclick="selectTimbre('dingdong', this)">
      <span class="icon">🔔</span>
      <span class="name">Din-don clásico</span>
      <button class="preview-btn" onclick="event.stopPropagation(); preview('dingdong')">▶ probar</button>
    </button>
    <button class="timbre-btn" onclick="selectTimbre('buzz', this)">
      <span class="icon">⚡</span>
      <span class="name">Timbre eléctrico</span>
      <button class="preview-btn" onclick="event.stopPropagation(); preview('buzz')">▶ probar</button>
    </button>
    <button class="timbre-btn" onclick="selectTimbre('campana', this)">
      <span class="icon">🎐</span>
      <span class="name">Campana</span>
      <button class="preview-btn" onclick="event.stopPropagation(); preview('campana')">▶ probar</button>
    </button>
    <button class="timbre-btn" onclick="selectTimbre('chime', this)">
      <span class="icon">✨</span>
      <span class="name">Chime suave</span>
      <button class="preview-btn" onclick="event.stopPropagation(); preview('chime')">▶ probar</button>
    </button>
    <button class="timbre-btn full recreo" onclick="selectTimbre('recreo', this)">
      <span class="icon">🏫</span>
      <span class="name">Timbre de recreo</span>
      <button class="preview-btn" onclick="event.stopPropagation(); preview('recreo')">▶ probar</button>
    </button>
  </div>

  <div class="log-title">Llegadas</div>
  <div class="log" id="log">
    <div class="empty" id="empty">Nadie llegó aún</div>
  </div>

  <button class="activate" id="activateBtn" onclick="activateAudio()">Activar sonido (tocá primero)</button>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
const ABLY_KEY = 'v1G3Ag.g0aoow:oREwCVy4aha_k-mMkJjOnEpx5EPzWfW1Zzfzkaiqa2g';
const CHANNEL  = 'timbre';

let audioCtx = null;
let currentTimbre = 'dingdong';
let count = 0;

const TIMBRES = {
  dingdong: {
    label: 'Din-don',
    play(ctx) {
      [
        { freq: 880, time: 0,   dur: 0.6 },
        { freq: 659, time: 0.5, dur: 0.9 },
        { freq: 784, time: 1.1, dur: 0.6 },
        { freq: 523, time: 1.6, dur: 1.0 },
      ].forEach(({ freq, time, dur }) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + time);
        gain.gain.setValueAtTime(0, ctx.currentTime + time);
        gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + time + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + dur);
        osc.start(ctx.currentTime + time);
        osc.stop(ctx.currentTime + time + dur);
      });
    }
  },

  buzz: {
    label: 'Eléctrico',
    play(ctx) {
      [0, 0.45].forEach(t => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, ctx.currentTime + t);
        gain.gain.setValueAtTime(0.25, ctx.currentTime + t);
        gain.gain.setValueAtTime(0.25, ctx.currentTime + t + 0.3);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + t + 0.35);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.4);
      });
    }
  },

  campana: {
    label: 'Campana',
    play(ctx) {
      [1046, 1318, 1568].forEach((freq, i) => {
        const t = i * 0.18;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + t);
        gain.gain.setValueAtTime(0, ctx.currentTime + t);
        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 1.8);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 2);

        const osc2 = ctx.createOscillator(), gain2 = ctx.createGain();
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(freq * 2.756, ctx.currentTime + t);
        gain2.gain.setValueAtTime(0, ctx.currentTime + t);
        gain2.gain.linearRampToValueAtTime(0.08, ctx.currentTime + t + 0.01);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.8);
        osc2.start(ctx.currentTime + t);
        osc2.stop(ctx.currentTime + t + 1);
      });
    }
  },

  chime: {
    label: 'Chime',
    play(ctx) {
      [
        { freq: 1174, time: 0,   dur: 1.5 },
        { freq: 1318, time: 0.2, dur: 1.5 },
        { freq: 1568, time: 0.4, dur: 2.0 },
        { freq: 1760, time: 0.7, dur: 2.2 },
      ].forEach(({ freq, time, dur }) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + time);
        gain.gain.setValueAtTime(0, ctx.currentTime + time);
        gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + time + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + dur);
        osc.start(ctx.currentTime + time);
        osc.stop(ctx.currentTime + time + dur + 0.1);
      });
    }
  },

  recreo: {
    label: 'Recreo 🏫',
    play(ctx) {
      const duration = 2.5;
      const freq = 880;
      const pulseRate = 25;

      const osc = ctx.createOscillator();
      const tremolo = ctx.createOscillator();
      const tremoloGain = ctx.createGain();
      const masterGain = ctx.createGain();
      const distortion = ctx.createWaveShaper();

      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
      }
      distortion.curve = curve;

      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      tremolo.type = 'sine';
      tremolo.frequency.setValueAtTime(pulseRate, ctx.currentTime);
      tremoloGain.gain.setValueAtTime(0.5, ctx.currentTime);
      masterGain.gain.setValueAtTime(0, ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.02);
      masterGain.gain.setValueAtTime(0.6, ctx.currentTime + duration - 0.05);
      masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);

      tremolo.connect(tremoloGain);
      tremoloGain.connect(masterGain.gain);
      osc.connect(distortion);
      distortion.connect(masterGain);
      masterGain.connect(ctx.destination);

      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
      tremolo.start(ctx.currentTime);
      tremolo.stop(ctx.currentTime + duration);

      const osc2 = ctx.createOscillator(), gain2 = ctx.createGain();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(freq * 1.5, ctx.currentTime);
      gain2.gain.setValueAtTime(0, ctx.currentTime);
      gain2.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
      gain2.gain.setValueAtTime(0.15, ctx.currentTime + duration - 0.05);
      gain2.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.start(ctx.currentTime);
      osc2.stop(ctx.currentTime + duration);
    }
  }
};

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function activateAudio() {
  const ctx = getCtx();
  const buf = ctx.createBuffer(1, 1, 22050);
  const src = ctx.createBufferSource();
  src.buffer = buf; src.connect(ctx.destination); src.start(0);
  const btn = document.getElementById('activateBtn');
  btn.textContent = '✓ Sonido activado';
  btn.style.color = '#7abf7a';
  btn.style.borderColor = '#7abf7a';
}

function selectTimbre(name, el) {
  currentTimbre = name;
  document.querySelectorAll('.timbre-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function preview(name) {
  TIMBRES[name].play(getCtx());
}

function flash() {
  const ind = document.getElementById('indicator');
  ind.classList.add('ring');
  setTimeout(() => ind.classList.remove('ring'), 1000);
}

function addLog(timbreLabel) {
  count++;
  const log = document.getElementById('log');
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  const time = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span>Visita #${count} <span class="lbl">${timbreLabel}</span></span><span class="time">${time}</span>`;
  log.insertBefore(entry, log.firstChild);
}

function setConn(ok) {
  document.getElementById('dot').className = 'dot ' + (ok ? 'green' : 'red');
  document.getElementById('connText').textContent = ok ? 'Conectado — esperando visitas' : 'Desconectado';
}

const client  = new Ably.Realtime({ key: ABLY_KEY });
const channel = client.channels.get(CHANNEL);

client.connection.on('connected',    () => setConn(true));
client.connection.on('disconnected', () => setConn(false));
client.connection.on('failed',       () => setConn(false));

channel.subscribe('llegada', () => {
  const t = TIMBRES[currentTimbre];
  t.play(getCtx());
  flash();
  addLog(t.label);
});
</script>
</body>
</html>
