<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timbre — Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0f0e0c;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #e8d5a3;
  }

  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 40% 60%, #1a1206 0%, #0f0e0c 70%);
  }

  .panel {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 380px;
    width: 100%;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: #e8d5a3;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    color: #5a5040;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    margin-bottom: 3rem;
  }

  /* Indicator */
  .indicator {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 2rem;
    background: #1a1810;
    border: 2px solid #2a2418;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    transition: all 0.3s;
    position: relative;
  }

  .indicator.ring {
    background: #2a1f06;
    border-color: #c9a84c;
    box-shadow: 0 0 40px rgba(201,168,76,0.5), 0 0 80px rgba(201,168,76,0.2);
    animation: pulse 0.6s ease-out;
  }

  @keyframes pulse {
    0%  { transform: scale(1); }
    30% { transform: scale(1.15); }
    60% { transform: scale(0.95); }
    100%{ transform: scale(1); }
  }

  /* Status dot */
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3a3228;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.green { background: #7abf7a; box-shadow: 0 0 6px #7abf7a; }
  .dot.red   { background: #bf7a7a; }

  .conn-status {
    font-size: 0.8rem;
    color: #5a5040;
    letter-spacing: 0.05em;
    margin-bottom: 2.5rem;
  }

  /* Log */
  .log-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #3a3228;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .log {
    background: #141210;
    border: 1px solid #1e1c18;
    border-radius: 6px;
    padding: 0.75rem 1rem;
    min-height: 120px;
    max-height: 180px;
    overflow-y: auto;
    text-align: left;
  }

  .log-entry {
    font-size: 0.82rem;
    color: #7a6e5e;
    padding: 0.35rem 0;
    border-bottom: 1px solid #1a1810;
    display: flex;
    justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .time { color: #c9a84c; font-size: 0.75rem; font-weight: 500; }

  .empty { color: #2a2418; font-size: 0.8rem; padding: 1rem 0; text-align: center; }

  /* Activate button */
  .activate {
    margin-top: 2rem;
    padding: 0.7rem 2rem;
    background: transparent;
    border: 1px solid #2a2418;
    color: #5a5040;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .activate:hover { border-color: #c9a84c; color: #c9a84c; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="panel">
  <h1>Timbre</h1>
  <p class="subtitle">Panel del anfitrión</p>

  <div class="indicator" id="indicator">🔔</div>

  <div class="conn-status" id="connStatus">
    <span class="dot" id="dot"></span>
    <span id="connText">Conectando…</span>
  </div>

  <div class="log-title">Llegadas</div>
  <div class="log" id="log">
    <div class="empty" id="empty">Nadie llegó aún</div>
  </div>

  <button class="activate" onclick="activateAudio()">Activar sonido (tocá primero)</button>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
const ABLY_KEY = 'v1G3Ag.g0aoow:oREwCVy4aha_k-mMkJjOnEpx5EPzWfW1Zzfzkaiqa2g';
const CHANNEL  = 'timbre';

let audioCtx = null;
let count = 0;

function activateAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Play silent buffer to unlock
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
  document.querySelector('.activate').textContent = '✓ Sonido activado';
  document.querySelector('.activate').style.color = '#7abf7a';
  document.querySelector('.activate').style.borderColor = '#7abf7a';
}

function playDoorbell() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  // Ding - Dong
  const notes = [
    { freq: 880, time: 0,    dur: 0.6 },
    { freq: 659, time: 0.5,  dur: 0.9 },
    { freq: 784, time: 1.1,  dur: 0.6 },
    { freq: 523, time: 1.6,  dur: 1.0 },
  ];

  notes.forEach(({ freq, time, dur }) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + time);

    gain.gain.setValueAtTime(0, audioCtx.currentTime + time);
    gain.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + time + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time + dur);

    osc.start(audioCtx.currentTime + time);
    osc.stop(audioCtx.currentTime + time + dur);
  });
}

function flash() {
  const ind = document.getElementById('indicator');
  ind.classList.add('ring');
  setTimeout(() => ind.classList.remove('ring'), 1000);
}

function addLog() {
  count++;
  const log   = document.getElementById('log');
  const empty = document.getElementById('empty');
  if (empty) empty.remove();

  const now  = new Date();
  const time = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span>Visita #${count}</span><span class="time">${time}</span>`;
  log.insertBefore(entry, log.firstChild);
}

function setConn(ok) {
  document.getElementById('dot').className     = 'dot ' + (ok ? 'green' : 'red');
  document.getElementById('connText').textContent = ok ? 'Conectado — esperando visitas' : 'Desconectado';
}

// Ably
const client  = new Ably.Realtime({ key: ABLY_KEY });
const channel = client.channels.get(CHANNEL);

client.connection.on('connected', () => setConn(true));
client.connection.on('disconnected', () => setConn(false));
client.connection.on('failed', () => setConn(false));

channel.subscribe('llegada', () => {
  playDoorbell();
  flash();
  addLog();
});
</script>
</body>
</html>
