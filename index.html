<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llegué</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0e0c;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 60% 40%, #2a1f0e 0%, #0f0e0c 70%);
  }

  .card {
    position: relative;
    text-align: center;
    padding: 3rem 2.5rem;
    z-index: 1;
  }

  .bell {
    font-size: 5rem;
    display: block;
    margin-bottom: 1.5rem;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(212,165,80,0.4));
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: #e8d5a3;
    letter-spacing: 0.02em;
    margin-bottom: 0.75rem;
  }

  p {
    color: #7a6e5e;
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .btn {
    margin-top: 2.5rem;
    padding: 1rem 3rem;
    background: #c9a84c;
    color: #0f0e0c;
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    display: block;
    width: 100%;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
  }

  .btn:hover { background: #e8c46a; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: #3a3228; color: #5a5040; cursor: default; transform: none; }

  .status {
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: #7a6e5e;
    min-height: 1.2em;
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }

  .status.ok { color: #7abf7a; }
  .status.err { color: #bf7a7a; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .ring {
    animation: ringShake 0.4s ease-in-out;
  }

  @keyframes ringShake {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(-20deg); }
    40% { transform: rotate(20deg); }
    60% { transform: rotate(-15deg); }
    80% { transform: rotate(10deg); }
    100% { transform: rotate(0deg); }
    animation-fill-mode: none;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <span class="bell" id="bell">🔔</span>
  <h1>Avisá que llegaste</h1>
  <p>Tocá el botón y te anunciamos</p>
  <button class="btn" id="btn" onclick="avisar()">Llegué</button>
  <div class="status" id="status"></div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
const ABLY_KEY = 'v1G3Ag.g0aoow:oREwCVy4aha_k-mMkJjOnEpx5EPzWfW1Zzfzkaiqa2g';
const CHANNEL  = 'timbre';

async function avisar() {
  const btn    = document.getElementById('btn');
  const bell   = document.getElementById('bell');
  const status = document.getElementById('status');

  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Enviando…';

  try {
    const client  = new Ably.Realtime({ key: ABLY_KEY });
    await new Promise(r => client.connection.once('connected', r));
    const channel = client.channels.get(CHANNEL);
    await channel.publish('llegada', { ts: Date.now() });

    bell.classList.add('ring');
    setTimeout(() => bell.classList.remove('ring'), 500);

    status.className = 'status ok';
    status.textContent = '✓ ¡Aviso enviado!';
  } catch(e) {
    status.className = 'status err';
    status.textContent = 'Error al enviar. Reintentá.';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
